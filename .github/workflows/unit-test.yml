name: Run Unit Tests

on:
  push:
    branches:
      - main
    paths:
      - 'packages/frontend/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'packages/frontend/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm -F @hanafuda/frontend test
